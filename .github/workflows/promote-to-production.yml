# Fast-forward main to develop (production promotion).
# Requires PROMOTE_GH_TOKEN secret + bypass on main ruleset (see workflow/RULE.md § Promote).
name: Promote to production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Require promote token secret
        run: |
          if [ -z "${{ secrets.PROMOTE_GH_TOKEN }}" ]; then
            echo "::error::Missing repository secret PROMOTE_GH_TOKEN (fine-grained PAT with Contents write)."
            echo "::error::Also add Administrator (or the PAT owner) to main ruleset bypass list."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROMOTE_GH_TOKEN }}

      - name: Verify fast-forward preconditions
        run: |
          git fetch origin main develop

          if git merge-base --is-ancestor origin/main origin/develop; then
            echo "main is an ancestor of develop — fast-forward promotion is allowed."
          else
            echo "::error::main is not an ancestor of develop. Promotion requires a fast-forward only."
            echo "::error::Do not squash-merge develop into main or back-merge main into develop."
            exit 1
          fi

          if [ "$(git rev-parse origin/main)" = "$(git rev-parse origin/develop)" ]; then
            echo "::error::develop and main are already at the same commit — nothing to promote."
            exit 1
          fi

      - name: Require green test check on develop tip
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_GH_TOKEN }}
        run: |
          SHA="$(git rev-parse origin/develop)"
          STATUS="$(gh api "repos/${{ github.repository }}/commits/${SHA}/status" --jq '.state')"
          if [ "$STATUS" != "success" ]; then
            echo "::error::Latest commit on develop does not have a successful combined status (state: ${STATUS})."
            exit 1
          fi

      - name: Fast-forward main to develop
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_GH_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout main
          git merge --ff-only origin/develop
          git push origin main
